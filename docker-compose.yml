name: Chat app

services:
  db:
    image: postgres:18
    container_name: chat-app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - chat-network

  server:
    build: .
    image: chat-app-server:latest
    container_name: chat-app-server
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "8080:8080"
    networks:
      - chat-network

volumes:
  postgres_data:

networks:
  chat-network:
    driver: bridge