name: CMake Target Build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      shared: ${{ steps.filter.outputs.shared }}
      global: ${{ steps.filter.outputs.global }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'server/**'
            client:
              - 'client/**'
            shared:
              - 'shared/**'
            global:
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - 'cmake/**'
              - 'scripts/**'
              - '.github/workflows/**'

  build-server:
    name: Build server target
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.global == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libpq-dev \
            libqt6sql6-psql

      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"
          cache: true

      - name: Show Qt version
        run: qmake -query QT_VERSION
      - name: Verify Qt >= 6.8
        run: |
          ver="$(qmake -query QT_VERSION)"
          printf "Qt version: %s\n" "$ver"
          if ! printf "%s\n%s\n" "6.8.0" "$ver" | sort -V -C; then
            echo "Qt 6.8 or newer is required" >&2
            exit 1
          fi

      - name: Configure
        run: cmake -S . -B build/server -G Ninja -DBUILD_CLIENT=OFF -DBUILD_SERVER=ON -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build server
        run: cmake --build build/server --target server_app --parallel

  build-client:
    name: Build client target
    needs: changes
    if: needs.changes.outputs.client == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.global == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build

      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"
          modules: "qtdeclarative"
          cache: true

      - name: Show Qt version
        run: qmake -query QT_VERSION
      - name: Verify Qt >= 6.8
        run: |
          ver="$(qmake -query QT_VERSION)"
          printf "Qt version: %s\n" "$ver"
          if ! printf "%s\n%s\n" "6.8.0" "$ver" | sort -V -C; then
            echo "Qt 6.8 or newer is required" >&2
            exit 1
          fi

      - name: Configure
        run: cmake -S . -B build/client -G Ninja -DBUILD_CLIENT=ON -DBUILD_SERVER=OFF -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build client
        run: cmake --build build/client --target client_app --parallel

  build-shared:
    name: Build shared target
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.global == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build

      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"
          modules: "qtdeclarative"
          cache: true

      - name: Show Qt version
        run: qmake -query QT_VERSION
      - name: Verify Qt >= 6.8
        run: |
          ver="$(qmake -query QT_VERSION)"
          printf "Qt version: %s\n" "$ver"
          if ! printf "%s\n%s\n" "6.8.0" "$ver" | sort -V -C; then
            echo "Qt 6.8 or newer is required" >&2
            exit 1
          fi

      - name: Configure
        run: cmake -S . -B build/shared -G Ninja -DBUILD_CLIENT=ON -DBUILD_SERVER=OFF -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build shared
        run: cmake --build build/shared --target shared --parallel
